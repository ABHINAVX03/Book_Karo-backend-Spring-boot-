# DB CONFIG
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.connection-init-sql=CREATE EXTENSION IF NOT EXISTS postgis

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
server.port=${PORT:8080}
spring.jpa.open-in-view=false

# SECURITY
app.security.jwt-secret=${JWT_SECRET_KEY:}
app.security.jwt-issuer=${JWT_ISSUER:bookcar-api}
app.security.jwt-audience=${JWT_AUDIENCE:bookcar-web}
app.security.access-token-minutes=${ACCESS_TOKEN_MINUTES:60}
app.security.refresh-token-days=${REFRESH_TOKEN_DAYS:30}
app.security.login-max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.security.login-max-attempts-per-minute=${LOGIN_MAX_ATTEMPTS_PER_MINUTE:10}
app.security.refresh-max-attempts-per-minute=${REFRESH_MAX_ATTEMPTS_PER_MINUTE:20}
app.security.otp-max-attempts=${OTP_MAX_ATTEMPTS:5}
app.security.otp-max-sends-per-window=${OTP_MAX_SENDS_PER_WINDOW:3}
app.security.otp-max-requests-per-minute=${OTP_MAX_REQUESTS_PER_MINUTE:6}
app.security.otp-verify-max-requests-per-minute=${OTP_VERIFY_MAX_REQUESTS_PER_MINUTE:10}
app.security.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.security.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:None}
app.security.access-cookie-secure=${ACCESS_COOKIE_SECURE:true}
app.security.access-cookie-same-site=${ACCESS_COOKIE_SAME_SITE:None}
app.security.captcha-enabled=${CAPTCHA_ENABLED:false}
app.security.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# PAYMENTS
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# SMTP CONFIG
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
# FLYWAY - DB MIGRATIONS
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

# SQL INITIALIZATION SEED DATA
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

# OBSERVABILITY
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# MULTIPART CONFIG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CLOUDINARY CONFIG
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# TWILIO CONFIG
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
