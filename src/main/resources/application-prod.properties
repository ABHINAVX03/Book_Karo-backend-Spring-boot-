# DB CONFIG
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.connection-init-sql=CREATE EXTENSION IF NOT EXISTS postgis

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
server.port=${PORT:8080}

# SECURITY
jwt.secretKey=${JWT_SECRET_KEY}
app.security.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.security.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:None}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173,http://localhost:4173,https://book-car-frontend.vercel.app}

# PAYMENTS
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# SMTP CONFIG
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# FLYWAY - DB MIGRATIONS
spring.flyway.enabled=false
# spring.flyway.baseline-on-migrate=true
# spring.flyway.baseline-version=1
# spring.flyway.locations=classpath:db/migration

# MULTIPART CONFIG
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CLOUDINARY CONFIG
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# TWILIO CONFIG
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
